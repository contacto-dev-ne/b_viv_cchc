name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Inject Secrets
        env:
          POWER_AUTOMATE_URL: ${{ secrets.POWER_AUTOMATE_URL }}
        run: |
          python3 -c "import os; content = open('Balance_vivienda.html').read(); open('Balance_vivienda.html', 'w').write(content.replace('{{POWER_AUTOMATE_URL}}', os.environ['POWER_AUTOMATE_URL']))"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
